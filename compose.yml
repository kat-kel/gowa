services:
  nextapp:
    container_name: nextapp
    image: nextapp:1.0.0
    build:
      context: ./frontend
      dockerfile: next.dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      goapp:
        condition: service_healthy
  
  frontend-test:
    container_name: frontend-test
    image: nextapp:1.0.0
    build:
      context: ./frontend
      dockerfile: next.dockerfile
      target: test
    environment:
      - NEXT_PUBLIC_API_URL=http://goapp:8000
    depends_on:
      goapp:
        condition: service_healthy
    profiles:
      - test
    command: jest --runInBand --forceExit --ci --detectOpenHandles
  
  goapp:
    container_name: goapp
    image: kat-kel/goapp:1.0.0
    build:
      context: ./backend
      dockerfile: go.dockerfile
    environment:
      DATABASE_URL: "postgres://postgres:postgres@db:5432/postgres?sslmode=disable"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 10s
  db:
    container_name: db
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - 5432:5432
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 2s
      retries: 5

volumes:
  pgdata:
